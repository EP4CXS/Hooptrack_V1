[build]
builder = "NIXPACKS"
buildCommand = "pip install -r myproject/requirements.txt"

[deploy]
startCommand = "cd myproject && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
