<div class="min-h-screen overflow-hidden relative font-sans flex items-center justify-center p-6">
  <div class="absolute inset-0 bg-gradient-to-b from-[#0a0e1a] via-[#0f1424] to-[#0a0e1a] z-0"></div>
  <div class="absolute inset-0 pointer-events-none z-0 opacity-10" style="background-image: linear-gradient(45deg,#000 25%,transparent 25%,transparent 75%,#000 75%,#000),linear-gradient(45deg,#000 25%,transparent 25%,transparent 75%,#000 75%,#000); background-size:20px 20px; background-position:0 0,10px 10px;"></div>
  <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute inset-0 w-full h-full" style="transform:perspective(1000px) rotateX(20deg) scale(1.2); transform-origin:center 80%;">
      <svg class="w-full h-full opacity-30" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="5" y="5" width="90" height="90" fill="none" stroke="#00d9ff" stroke-width="0.5" />
        <circle cx="50" cy="50" r="10" fill="none" stroke="#ff6b35" stroke-width="0.5" />
        <line x1="5" y1="50" x2="95" y2="50" stroke="#00d9ff" stroke-width="0.5" />
        <path d="M35,5 L35,25 L65,25 L65,5" fill="none" stroke="#ff6b35" stroke-width="0.5" />
        <path d="M10,5 Q10,35 50,35 Q90,35 90,5" fill="none" stroke="#00d9ff" stroke-width="0.5" />
        <path d="M35,95 L35,75 L65,75 L65,95" fill="none" stroke="#ff6b35" stroke-width="0.5" />
        <path d="M10,95 Q10,65 50,65 Q90,65 90,95" fill="none" stroke="#00d9ff" stroke-width="0.5" />
      </svg>
    </div>
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-[#00d9ff] rounded-full blur-[100px] opacity-10 hoop-glow-cyan"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-[#ff6b35] rounded-full blur-[100px] opacity-10 hoop-glow-orange"></div>
  </div>

  <div class="relative z-10 w-full max-w-md overflow-hidden px-1">
    <a href="/" class="flex items-center justify-center mb-5">
      <img src="/static/app/img/hooptrack-logo.svg" alt="HoopTrack" class="h-24 w-auto" />
    </a>

    <div class="relative p-6 md:p-8 rounded-3xl bg-black/30 backdrop-blur-xl border border-white/10 shadow-2xl shadow-[#00d9ff]/10">
      <div id="signup-msg" class="hidden mb-4 text-sm text-center" role="alert"></div>
      <div class="text-center mb-6">
        <h2 class="text-3xl font-bold mb-2 text-white italic" style="font-family:Orbitron, sans-serif">Create Account</h2>
        <p class="text-gray-400 text-sm">Start your journey with next-gen analytics</p>
      </div>

      <form id="signup-form">
        <div class="relative w-full overflow-hidden">
          <div id="signup-slider" class="signup-steps-track flex w-[200%] translate-x-0">
            <div id="signup-step-panel-1" class="w-1/2 shrink-0 pr-1.5 box-border space-y-4">
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Full Name</label>
                <div class="relative">
                  <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                  <input name="username" required class="signup-step1-field w-full pl-12 pr-4 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white placeholder-gray-500 text-sm" placeholder="johndoe" autocomplete="username" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Email</label>
                <div class="relative">
                  <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                  <input name="email" type="email" required class="signup-step1-field w-full pl-12 pr-4 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white placeholder-gray-500 text-sm" placeholder="you@example.com" autocomplete="email" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Municipality</label>
                <div class="relative">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff] pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                  <select id="region-select" name="region_id" required class="signup-step1-field w-full pl-11 pr-10 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white appearance-none text-sm">
                    <option value="">Select Municipality</option>
                  </select>
                  <svg class="absolute right-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Barangay</label>
                <div class="relative">
                  <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff] pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                  <select id="province-select" name="province_id" required class="signup-step1-field w-full pl-11 pr-10 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white appearance-none text-sm" disabled>
                    <option value="">Select Barangay</option>
                  </select>
                  <svg class="absolute right-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </div>
              </div>
              <button type="button" id="signup-continue" class="w-full py-3 rounded-lg bg-[#00d9ff] text-black font-black uppercase tracking-wide hover:shadow-[0_0_20px_rgba(0,217,255,0.35)] transition-all transform hover:-translate-y-0.5 text-sm">
                Continue →
              </button>
            </div>

            <div id="signup-step-panel-2" class="w-1/2 shrink-0 pl-1.5 box-border space-y-4">
              <div class="text-left mb-1">
                <h3 class="text-xl font-bold text-white italic" style="font-family:Orbitron, sans-serif">Create Password</h3>
                <p class="text-gray-500 text-xs mt-1">At least 8 characters. Keep your account secure.</p>
              </div>
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Password</label>
                <div class="relative">
                  <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                  <input id="signup-password" name="password" type="password" required minlength="8" tabindex="-1" class="signup-step2-field w-full pl-12 pr-12 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white placeholder-gray-500 text-sm disabled:opacity-40" placeholder="••••••••" autocomplete="new-password" disabled />
                  <button type="button" id="signup-toggle-password" tabindex="-1" disabled class="signup-step2-field absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-[#00d9ff] transition-colors disabled:pointer-events-none" aria-label="Show password">
                    <svg id="signup-eye-open" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                    <svg id="signup-eye-off" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.956 9.956 0 012.293-3.95M6.228 6.228A9.956 9.956 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.953 9.953 0 01-4.293 5.042M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L9.88 9.88" /></svg>
                  </button>
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium mb-2 text-gray-300 uppercase tracking-wider">Confirm Password</label>
                <div class="relative">
                  <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-[#00d9ff]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                  <input id="signup-confirm-password" name="confirm_password" type="password" required minlength="8" tabindex="-1" class="signup-step2-field w-full pl-12 pr-4 py-2.5 rounded-lg bg-white/5 border-2 border-transparent focus:border-[#00d9ff] focus:bg-black/20 focus:outline-none transition-all text-white placeholder-gray-500 text-sm disabled:opacity-40" placeholder="••••••••" autocomplete="new-password" disabled />
                </div>
              </div>

              <div class="flex items-start gap-2 pt-1">
                <input id="terms" type="checkbox" required tabindex="-1" class="signup-step2-field w-4 h-4 mt-0.5 rounded border-2 border-white/20 bg-white/10 text-[#ff6b35] focus:ring-[#ff6b35] disabled:opacity-40" disabled />
                <label for="terms" class="text-xs text-gray-400 leading-snug">
                  I agree to the <span class="text-[#00d9ff]">Terms of Service</span> and <span class="text-[#00d9ff]">Privacy Policy</span>
                </label>
              </div>

              <button type="submit" id="signup-submit" tabindex="-1" disabled class="signup-step2-field w-full py-3 rounded-lg bg-[#ff6b35] text-black font-black uppercase tracking-wide hover:bg-[#ff8555] hover:shadow-[0_0_20px_rgba(255,107,53,0.5)] transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2 disabled:opacity-50 text-sm cursor-not-allowed enabled:cursor-pointer">
                <span id="signup-btn-label" class="flex items-center gap-2">
                  Create Account
                  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </span>
              </button>
              <button type="button" id="signup-back" class="w-full pt-2 text-center text-sm text-gray-400 hover:text-white transition-colors">
                ← Back
              </button>
            </div>
          </div>
        </div>
      </form>

      <div class="mt-8 text-center">
        <p class="text-gray-400">Already have an account? <a href="/login/" class="text-[#00d9ff] hover:text-white transition-colors font-medium">Log in</a></p>
      </div>
    </div>
    <div class="mt-6 text-center">
      <a href="/" class="text-gray-400 hover:text-white transition-colors text-sm">← Back to home</a>
    </div>
  </div>
</div>
