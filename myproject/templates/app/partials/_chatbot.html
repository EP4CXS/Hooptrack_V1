{% comment %}Floating chatbot shown on authenticated pages.{% endcomment %}
<div class="fixed bottom-5 right-5 z-50">
  <button id="chatbot-toggle" class="w-14 h-14 rounded-full bg-gradient-to-br from-orange-500 to-orange-600 hover:from-orange-400 hover:to-orange-500 text-white shadow-xl ring-1 ring-white/15 flex items-center justify-center overflow-hidden transition-transform hover:scale-105">
    <img src="/media/img/hooptrack_chatbot.png" alt="Chat" class="w-9 h-9" />
  </button>
  <div id="chatbot-panel" class="hidden absolute bottom-16 right-0 overflow-hidden">
    <div class="bg-gradient-to-r from-[#ef4444] via-[#dc2626] to-[#f97316] text-white px-4 py-3">
      <div class="font-semibold flex items-center gap-2">
        <img src="/media/img/hooptrack_chatbot.png" alt="Assistant" class="w-5 h-5" />
        HoopTrack Court AI
      </div>
      <div class="text-[11px] text-orange-50/90">Coach-style basketball insights</div>
    </div>
    <div id="chatbot-messages" class="h-72 overflow-y-auto p-3 space-y-2 text-sm">
      <div class="chatbot-bubble-bot rounded-xl px-3 py-2">Hi Coach! Ask me about lineups, matchups, brackets, or predictions.</div>
    </div>
    <form id="chatbot-form" class="p-2 border-t border-white/10 bg-[#111827] flex gap-2">
      <input id="chatbot-input" class="flex-1 border border-white/10 bg-[#1f2937] text-slate-100 rounded-lg px-3 py-2 text-sm placeholder:text-slate-400" placeholder="Ask Court AI..." />
      <button class="bg-gradient-to-b from-[#ef4444] to-[#dc2626] text-white rounded-lg px-3 py-2 text-sm font-semibold">Send</button>
    </form>
  </div>
</div>
